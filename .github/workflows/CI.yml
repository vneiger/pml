###########################################
#  adapted from FLINT's workflows/CI.yml  #
###########################################

name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  GLOBAL_MULTIPLIER: 1

concurrency:
  # Group by workflow and ref, and to limit to 1 concurrent job except for main
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' || github.run_number }}
  # Cancel intermediate builds for pull requests
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  ##############################################################################
  # ubuntu 24.04, gcc, flint dev
  ##############################################################################
  ubuntu-gcc-flintdev:
    name: Ubuntu 24.04, GCC, FLINT dev (x10)

    runs-on: ubuntu-24.04

    env:
      CC: "gcc"
      TESTCOEFF: "10"

    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - name: "Setup"
        run: |
          sudo apt-get install -y \
            libgmp-dev \
            libmpfr-dev \
            autoconf \
            libtool-bin

          # Check versions
          gcc --version
          make --version
          autoconf --version
          libtool --version
          echo "MAKE=make -j$(expr $(nproc) + 1) --output-sync=target" >> $GITHUB_ENV

          # install FLINT dev version
          git clone --depth=1 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure CC=${CC} --disable-debug
          make
          sudo make install
          sudo ldconfig

      - name: "Configure"
        run: |
          cd flint-extras
          ./bootstrap.sh
          ./configure \
            CC=${CC}

      - name: "Compile library"
        run: |
          cd flint-extras
          $MAKE
          ldd libpml.so

      - name: "Compile tests"
        run: |
          cd flint-extras
          $MAKE tests

      - name: "Compile profile"
        run: |
          cd flint-extras
          $MAKE profile

      - name: "Check"
        run: cd flint-extras && echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && $MAKE check

  ##############################################################################
  # ubuntu 24.04, clang, flint 3.4.0
  ##############################################################################
  ubuntu-clang-flint340:
    name: Ubuntu 24.04, clang, FLINT 3.4.0 (x10)

    runs-on: ubuntu-24.04

    env:
      CC: "clang"
      TESTCOEFF: "10"

    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - name: "Setup"
        run: |
          sudo apt-get install -y \
            libgmp-dev \
            libmpfr-dev \
            autoconf \
            libtool-bin

          # Check versions
          clang --version
          make --version
          autoconf --version
          libtool --version
          echo "MAKE=make -j$(expr $(nproc) + 1) --output-sync=target" >> $GITHUB_ENV

          # install FLINT 3.4.0 version
          git clone --depth=1 https://github.com/flintlib/flint.git --branch v3.4.0 --single-branch
          cd flint
          ./bootstrap.sh
          ./configure CC=${CC} --disable-debug
          make
          sudo make install
          sudo ldconfig

      - name: "Configure"
        run: |
          cd flint-extras
          ./bootstrap.sh
          ./configure \
            CC=${CC}

      - name: "Compile library"
        run: |
          cd flint-extras
          $MAKE
          ldd libpml.so

      - name: "Compile tests"
        run: |
          cd flint-extras
          $MAKE tests

      - name: "Check"
        run: cd flint-extras && echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && $MAKE check

  ##############################################################################
  # ubuntu 24.04 ARM, gcc, flint dev
  ##############################################################################
  ubuntu-gcc-flintdev-arm:
    name: Ubuntu 24.04 ARM, GCC, FLINT dev (x5)

    runs-on: ubuntu-24.04-arm

    env:
      CC: "gcc"
      TESTCOEFF: "5"

    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - name: "Setup"
        run: |
          sudo apt-get install -y \
            libgmp-dev \
            libmpfr-dev \
            autoconf \
            libtool-bin

          # Check versions
          gcc --version
          make --version
          autoconf --version
          libtool --version
          echo "MAKE=make -j$(expr $(nproc) + 1) --output-sync=target" >> $GITHUB_ENV

          # install FLINT dev version
          git clone --depth=1 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure CC=${CC} --disable-debug
          make
          sudo make install
          sudo ldconfig

      - name: "Configure"
        run: |
          cd flint-extras
          ./bootstrap.sh
          ./configure \
            CC=${CC} \
            --disable-debug

      - name: "Compile library"
        run: |
          cd flint-extras
          $MAKE
          ldd libpml.so

      - name: "Compile tests"
        run: |
          cd flint-extras
          $MAKE tests

      - name: "Check"
        run: cd flint-extras && echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && $MAKE check

  ##############################################################################
  # ubuntu 24.04 clang, flint dev, BLAS, ASan
  ##############################################################################
  ubuntu-asan-clang:
    name: Ubuntu 24.04, clang, FLINT dev with BLAS, ASan (x1)
    runs-on: ubuntu-24.04
    env:
      CC: "clang"
      TESTCOEFF: "1"
    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - uses: actions/checkout@v6
      - name: "Setup"
        run: |
          sudo apt-get install -y libgmp-dev libmpfr-dev autoconf libtool-bin perl libopenblas-dev
          clang --version
          make --version
          autoconf --version
          libtool --version
          echo "MAKE=make -j$(expr $(nproc) + 1) --output-sync=target" >> $GITHUB_ENV

          # install FLINT dev version
          git clone --depth=1 https://github.com/flintlib/flint.git
          cd flint && ./bootstrap.sh && ./configure CC=${CC} --with-blas --disable-debug --enable-asan
          $MAKE
          sudo make install
          sudo ldconfig

      - name: "Configure"
        run: |
          cd flint-extras
          ./bootstrap.sh
          ./configure CC=$(CC) --enable-asan --disable-debug
      - name: "Compile library"
        run: cd flint-extras && $MAKE && ldd libpml.so
      - name: "Compile tests"
        run: cd flint-extras && $MAKE tests
      - name: "Compile profile"
        run: cd flint-extras && $MAKE profile
      - name: "Check"
        run: cd flint-extras && echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && $MAKE check

  ##############################################################################
  # macos (M1), clang, homebrewed FLINT
  ##############################################################################
  macos-m1-brewedflint:
    name: macOS-M1, Clang, homebrewed FLINT (x3)

    runs-on: macos-15

    env:
      TESTCOEFF: "3"

    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - name: "Setup"
        run: |
          # GMP and MPFR are already installed, and it complains if we try to
          # install it.
          #   brew install gmp
          #   brew install mpfr
          brew install make
          brew install autoconf
          brew install libtool
          brew install automake
          brew install llvm
          brew install flint
          $(brew --prefix llvm)/bin/clang --version
          gmake --version
          autoconf --version
          echo "MAKE=gmake -j$(expr $(nproc) + 1) -l 10 --output-sync=target" >> $GITHUB_ENV

      - name: "Configure"
        run: |
          cd flint-extras
          ./bootstrap.sh
          ./configure \
            CC=$(brew --prefix llvm)/bin/clang \
            --with-gmp=$(brew --prefix) \
            --with-mpfr=$(brew --prefix) \
            --disable-debug

      - name: "Compile library"
        run: |
          cd flint-extras
          $MAKE

      - name: "Compile tests"
        run: |
          cd flint-extras
          $MAKE tests

      - name: "Check"
        run: cd flint-extras && echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && $MAKE check


  ##############################################################################
  # macos (M1), gcc, flint-dev
  ##############################################################################
  macos-m1-flintdev:
    name: macOS-M1, gcc, flint-dev (x3)

    runs-on: macos-15

    env:
      TESTCOEFF: "3"

    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - name: "Setup"
        run: |
          # GMP and MPFR are already installed, and it complains if we try to
          # install it.
          #   brew install gmp
          #   brew install mpfr
          brew install make
          brew install autoconf
          brew install libtool
          brew install automake
          gcc --version
          gmake --version
          autoconf --version
          echo "MAKE=gmake -j$(expr $(nproc) + 1) -l 10 --output-sync=target" >> $GITHUB_ENV

          # install FLINT dev version
          git clone --depth=1 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            CC=$(CC) \
            --with-gmp=$(brew --prefix) \
            --with-mpfr=$(brew --prefix) \
            --disable-debug
          make
          sudo make install

      - name: "Configure"
        run: |
          cd flint-extras
          ./bootstrap.sh
          ./configure \
            CC=$(CC) \
            --with-gmp=$(brew --prefix) \
            --with-mpfr=$(brew --prefix) \
            --disable-debug

      - name: "Compile library"
        run: |
          cd flint-extras
          $MAKE

      - name: "Compile tests"
        run: |
          cd flint-extras
          $MAKE tests

      - name: "Compile profile"
        run: |
          cd flint-extras
          $MAKE profile

      - name: "Check"
        run: cd flint-extras && echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && $MAKE check

